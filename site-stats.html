<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
    <title>Site stats – SailingSA</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; padding: 28px; background: #fff; color: #111; }
        .site-stats { max-width: 920px; margin: 0 auto; }
        .site-stats-date { font-size: 1.04rem; font-weight: bold; color: #001f3f; margin-bottom: 23px; text-align: center; }
        .stat-cards-row { display: flex; flex-direction: row; flex-wrap: wrap; gap: 18px; align-items: flex-start; justify-content: center; }
        .stat-card { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 18px; background: #001f3f; border-radius: 14px; margin-bottom: 18px; width: fit-content; }
        .stat-value-wrap { flex-shrink: 0; width: 83px; height: 83px; position: relative; display: flex; align-items: center; justify-content: center; overflow: visible; margin: 0; transform: translateY(-8px); }
        .stat-ring { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
        .stat-ring circle { fill: none; stroke-width: 14; stroke-linecap: round; stroke-dasharray: 440; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .stat-ring .ring-track { stroke: #3a3d42; stroke-dashoffset: 0; }
        .stat-ring .ring-fill { stroke: #B3E5FC; stroke-dashoffset: 440; }
        .stat-ring .ring-fill.ring-fill-green { stroke: #00E676; }
        .stat-ring .ring-fill.ring-fill-orange { stroke: #FF9500; }
        .stat-ring .ring-fill.ring-fill-red { stroke: #FF3B30; }
        .stat-value-inner { position: absolute; inset: 0; z-index: 1; display: flex; align-items: center; justify-content: center; font-size: 1.01rem; font-weight: 800; color: #fff; line-height: 1; text-align: center; transform: translateY(9px); }
        .stat-value-inner.loading { color: #fff; }
        .stat-label-above { font-size: 0.81rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #fff; text-align: center; }
        .stat-label-below { font-size: 0.81rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #fff; text-align: center; }
        @media (max-width: 640px) {
            body { padding: 12px 9px 6px 9px; }
            .site-stats { padding: 0; max-width: 100%; }
            .site-stats-date { font-size: 0.81rem; margin-bottom: 4px; }
            .stat-cards-row { flex-wrap: nowrap; gap: 7px; justify-content: space-between; }
            .stat-card { padding: 7px 5px; margin-bottom: 0; border-radius: 9px; gap: 2px; flex: 1 1 0; min-width: 0; }
            .stat-value-wrap { width: 51px; height: 51px; transform: translateY(-3px); }
            .stat-ring circle { stroke-width: 9; }
            .stat-value-inner { font-size: 0.69rem; transform: translateY(5px); }
            .stat-label-above, .stat-label-below { font-size: 0.58rem; letter-spacing: 0.02em; }
        }
    </style>
</head>
<body>
    <div class="site-stats">
        <div class="site-stats-date" id="site-stats-date"></div>
        <div class="stat-cards-row">
            <!-- Template: stat card = label-above + value-wrap (SVG ring + number) + label-below. -->
            <div class="stat-card" id="active-sailors-card">
                <div class="stat-label-above">Active</div>
                <div class="stat-value-wrap">
                    <svg class="stat-ring" viewBox="-8 -8 156 156">
                        <circle class="ring-track" cx="70" cy="70" r="70"/>
                        <circle class="ring-fill" id="active-sailors-ring" cx="70" cy="70" r="70"/>
                    </svg>
                    <div class="stat-value-inner loading" id="active-sailors-circle">
                        <span id="active-sailors-value">0</span>
                    </div>
                </div>
                <div class="stat-label-below">Sailors</div>
            </div>
            <div class="stat-card" id="stat-card-2">
                <div class="stat-label-above">Classes</div>
                <div class="stat-value-wrap">
                    <svg class="stat-ring" viewBox="-8 -8 156 156">
                        <circle class="ring-track" cx="70" cy="70" r="70"/>
                        <circle class="ring-fill ring-fill-green" id="stat-2-ring" cx="70" cy="70" r="70"/>
                    </svg>
                    <div class="stat-value-inner loading" id="stat-2-circle">
                        <span id="stat-2-value">0</span>
                    </div>
                </div>
                <div class="stat-label-below">Sailed</div>
            </div>
            <div class="stat-card" id="stat-card-3">
                <div class="stat-label-above">Regatta's</div>
                <div class="stat-value-wrap">
                    <svg class="stat-ring" viewBox="-8 -8 156 156">
                        <circle class="ring-track" cx="70" cy="70" r="70"/>
                        <circle class="ring-fill ring-fill-orange" id="stat-3-ring" cx="70" cy="70" r="70"/>
                    </svg>
                    <div class="stat-value-inner loading" id="stat-3-circle">
                        <span id="stat-3-value">0</span>
                    </div>
                </div>
                <div class="stat-label-below">Sailed</div>
            </div>
            <div class="stat-card" id="stat-card-4">
                <div class="stat-label-above">Races</div>
                <div class="stat-value-wrap">
                    <svg class="stat-ring" viewBox="-8 -8 156 156">
                        <circle class="ring-track" cx="70" cy="70" r="70"/>
                        <circle class="ring-fill ring-fill-red" id="stat-4-ring" cx="70" cy="70" r="70"/>
                    </svg>
                    <div class="stat-value-inner loading" id="stat-4-circle">
                        <span id="stat-4-value">0</span>
                    </div>
                </div>
                <div class="stat-label-below">raced</div>
            </div>
        </div>
    </div>
    <script>
        (function() {
            // When embedded in iframe (homepage): hide date so only gauges show; time is shown in index.html
            if (window.self !== window.top) {
                var dateEl = document.getElementById('site-stats-date');
                if (dateEl) dateEl.style.display = 'none';
                document.body.style.paddingTop = '0';
            }
            function updateClock() {
                var d = new Date();
                var dateEl = document.getElementById('site-stats-date');
                if (dateEl) {
                    var dateStr = d.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                    var timeStr = d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    dateEl.textContent = dateStr + ' at ' + timeStr;
                }
            }
            updateClock();
            setInterval(updateClock, 1000);
            var apiBase = window.location.origin;
            var host = (window.location.hostname || '').toLowerCase();
            if (host === 'sailingsa.co.za' || host === 'www.sailingsa.co.za') {
                apiBase = apiBase || 'https://sailingsa.co.za';
            } else if (!apiBase || apiBase === 'null' || String(apiBase).indexOf('file') === 0) {
                apiBase = window.location.origin || 'https://sailingsa.co.za';
            }
            var circumference = 440;
            function runCountUp(valueEl, circleEl, ringEl, total, durationMs, colorWhenDone) {
                if (!valueEl) return;
                var n = (total != null && total !== '') ? Number(total) : NaN;
                if (n !== n || n < 0) { valueEl.textContent = '0'; if (circleEl) circleEl.classList.remove('loading'); if (ringEl) ringEl.style.strokeDashoffset = circumference; return; }
                total = Math.floor(n);
                if (total === 0) { valueEl.textContent = '0'; if (circleEl) circleEl.classList.remove('loading'); if (ringEl) ringEl.style.strokeDashoffset = circumference; if (colorWhenDone) { valueEl.style.color = colorWhenDone; var card = valueEl.closest('.stat-card'); if (card) { var a = card.querySelector('.stat-label-above'); var b = card.querySelector('.stat-label-below'); if (a) a.style.color = colorWhenDone; if (b) b.style.color = colorWhenDone; } } return; }
                valueEl.textContent = '1';
                if (ringEl) ringEl.style.strokeDashoffset = circumference;
                var startTime = null;
                function step(timestamp) {
                    if (!startTime) startTime = timestamp;
                    var elapsed = timestamp - startTime;
                    var progress = Math.min(elapsed / durationMs, 1);
                    var current = Math.round(1 + (total - 1) * progress);
                    if (current > total) current = total;
                    valueEl.textContent = current.toLocaleString();
                    var ringProgress = total <= 1 ? 1 : (current - 1) / (total - 1);
                    if (ringEl) ringEl.style.strokeDashoffset = circumference - (circumference * ringProgress);
                    if (progress < 1) requestAnimationFrame(step);
                    else {
                        valueEl.textContent = total.toLocaleString();
                        if (ringEl) ringEl.style.strokeDashoffset = 0;
                        if (circleEl) circleEl.classList.remove('loading');
                        if (colorWhenDone) {
                            valueEl.style.color = colorWhenDone;
                            var card = valueEl.closest('.stat-card');
                            if (card) {
                                var a = card.querySelector('.stat-label-above');
                                var b = card.querySelector('.stat-label-below');
                                if (a) a.style.color = colorWhenDone;
                                if (b) b.style.color = colorWhenDone;
                            }
                        }
                    }
                }
                requestAnimationFrame(step);
            }
            function setFallbackNumbers() {
                    var v1 = document.getElementById('active-sailors-value');
                    var v2 = document.getElementById('stat-2-value');
                    var v3 = document.getElementById('stat-3-value');
                    var v4 = document.getElementById('stat-4-value');
                    var c1 = document.getElementById('active-sailors-circle');
                    var c2 = document.getElementById('stat-2-circle');
                    var c3 = document.getElementById('stat-3-circle');
                    var c4 = document.getElementById('stat-4-circle');
                    if (v1) v1.textContent = '0';
                    if (v2) v2.textContent = '0';
                    if (v3) v3.textContent = '0';
                    if (v4) v4.textContent = '0';
                    if (c1) c1.classList.remove('loading');
                    if (c2) c2.classList.remove('loading');
                    if (c3) c3.classList.remove('loading');
                    if (c4) c4.classList.remove('loading');
                }
            function flashLabels(cardEl, color, done) {
                var above = cardEl ? cardEl.querySelector('.stat-label-above') : null;
                var below = cardEl ? cardEl.querySelector('.stat-label-below') : null;
                var defaultColor = '#fff';
                function set(c) { if (above) above.style.color = c; if (below) below.style.color = c; }
                set(color);
                setTimeout(function() { set(defaultColor); setTimeout(function() { set(color); setTimeout(function() { set(defaultColor); setTimeout(done, 0); }, 380); }, 380); }, 380);
            }
            var cards = [
                { card: document.getElementById('active-sailors-card'), color: '#B3E5FC', valueEl: document.getElementById('active-sailors-value'), circleEl: document.getElementById('active-sailors-circle'), ringEl: document.getElementById('active-sailors-ring') },
                { card: document.getElementById('stat-card-2'), color: '#00E676', valueEl: document.getElementById('stat-2-value'), circleEl: document.getElementById('stat-2-circle'), ringEl: document.getElementById('stat-2-ring') },
                { card: document.getElementById('stat-card-3'), color: '#FF9500', valueEl: document.getElementById('stat-3-value'), circleEl: document.getElementById('stat-3-circle'), ringEl: document.getElementById('stat-3-ring') },
                { card: document.getElementById('stat-card-4'), color: '#FF3B30', valueEl: document.getElementById('stat-4-value'), circleEl: document.getElementById('stat-4-circle'), ringEl: document.getElementById('stat-4-ring') }
            ];
            var countDuration = 2500;
            function runSequence(data) {
                var idx = 0;
                function next() {
                    if (idx >= 4) return;
                    var c = cards[idx];
                    var val = idx === 0 ? data.active_sailors : idx === 1 ? data.classes_sailed : idx === 2 ? data.regattas_sailed : data.races_raced;
                    flashLabels(c.card, c.color, function() {
                        setTimeout(function() {
                            runCountUp(c.valueEl, c.circleEl, c.ringEl, val, countDuration, c.color);
                            setTimeout(function() { idx++; next(); }, countDuration + 350);
                        }, 350);
                    });
                }
                next();
            }
            var fallbackTimer = setTimeout(setFallbackNumbers, 15000);
            fetch(apiBase + '/api/site-stats')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    clearTimeout(fallbackTimer);
                    if (!data || data.error) {
                        setFallbackNumbers();
                        return;
                    }
                    runSequence(data);
                })
                .catch(function() {
                    clearTimeout(fallbackTimer);
                    setFallbackNumbers();
                });
        })();
    </script>
</body>
</html>
