# TimAdvisor Configuration
server {
    server_name timadvisor.co.za www.timadvisor.co.za;
    root /var/www/timadvisor;

    index index.html;

    location ^~ /auth/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|JPG|PNG)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/timadvisor.co.za/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/timadvisor.co.za/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

# SailingSA Configuration
# HTTPS www → apex (single 301). Live uses sites-available/sailingsa; see also
# sailingsa/deploy/nginx-sailingsa-www-redirect-443.conf
server {
    listen [::]:443 ssl;
    listen 443 ssl;
    server_name www.sailingsa.co.za;
    ssl_certificate /etc/letsencrypt/live/sailingsa.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sailingsa.co.za/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://sailingsa.co.za$request_uri;
}

server {
    server_name sailingsa.co.za;
    root /var/www/sailingsa;
    index index.html;
    # Redirect old path to root (mobile/cloud parity: /login.html not /sailingsa/frontend/login.html)
    location ^~ /sailingsa/frontend/ {
        rewrite ^/sailingsa/frontend/(.*)$ $scheme://$host/$1 permanent;
    }



    # normalize legacy paths
    # /index.html — serve file (SPA); do not 301 to /

    location = /home {
        return 301 https://sailingsa.co.za/;
    }

    location = /home/ {
        return 301 https://sailingsa.co.za/;
    }

    location ~ ^/sailor/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /auth/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    location ~ ^/regatta/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /admin/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|JPG|PNG|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/sailingsa.co.za/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sailingsa.co.za/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

server {
    if ($host = www.timadvisor.co.za) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = timadvisor.co.za) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80 default_server;
    listen [::]:80 default_server;
    server_name timadvisor.co.za www.timadvisor.co.za;
    return 301 https:$host$request_uri; # managed by Certbot




}
server {
    listen 80;
    listen [::]:80;
    server_name www.sailingsa.co.za;
    return 301 https://sailingsa.co.za$request_uri;
}
server {
