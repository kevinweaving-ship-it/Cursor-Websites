# Live (sailingsa.co.za) when root uses:
#   location / { try_files $uri $uri/ @api; }
# Insert BEFORE `location / {` so these win over @api.

# Class results iframe document: never cache (browser often reuses iframe / stale VM).
    location = /regatta/class/class-results.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        try_files $uri =404;
    }

# Canonical login: static file at docroot (not API, not /frontend/ stub).
    location = /login.html {
        try_files /login.html =404;
    }

    location = /signup.html {
        return 301 /login.html;
    }

    location = /regatta_viewer.html {
        try_files /regatta_viewer.html =404;
    }

    location ~ ^/class/ {
        try_files $uri $uri/ /index.html;
    }
