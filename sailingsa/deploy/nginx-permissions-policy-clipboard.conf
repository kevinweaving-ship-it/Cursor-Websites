# Optional: allow Clipboard API (read/write) for same-origin pages (e.g. blank.html hub paste).
# Add inside the server { } block for sailingsa.co.za, then: nginx -t && systemctl reload nginx
#
# Without this, most browsers still allow clipboard on HTTPS same-origin; use if a global
# Permissions-Policy elsewhere blocks clipboard-read.
#
add_header Permissions-Policy "clipboard-read=(self), clipboard-write=(self)" always;
