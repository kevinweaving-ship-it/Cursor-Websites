# IMMEDIATE FIX: Map /sailingsa/frontend/ → web root
# Add this location block BEFORE "location /" in your sailingsa nginx server config.
# Example: /etc/nginx/sites-available/sailingsa.co.za
#
# Steps:
# 1. Edit: sudo nano /etc/nginx/sites-available/sailingsa.co.za
# 2. Insert the block below BEFORE the main "location /" block
# 3. Test: nginx -t
# 4. Reload: sudo systemctl reload nginx
#
# Effect: /sailingsa/frontend/index.html → /var/www/sailingsa/index.html
#         /sailingsa/frontend/login.html → /var/www/sailingsa/login.html
#         /sailingsa/frontend/assets/...  → /var/www/sailingsa/assets/...
#
# PERMANENT FIX: Frontend now uses root paths (/index.html, /login.html).
# This alias keeps old links working during transition.

location /sailingsa/frontend/ {
    alias /var/www/sailingsa/;
}
