# Live sailingsa.co.za — hub file is blank.html
#
# Product rule: hub development / QA uses https://sailingsa.co.za/blank.html ONLY.
# This snippet makes BOTH `location = /` and `location = /blank.html` serve the same
# on-disk file (/blank.html). Deploying blank.html therefore affects "/" and "/blank.html"
# until nginx is changed so `location = /` uses another file (e.g. index.html).
#
# OPTIONAL SPLIT (hub only at /blank.html, SPA or legacy home at /):
#   location = / {
#       add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
#       add_header Pragma "no-cache" always;
#       try_files /index.html =404;
#   }
#   location = /blank.html { ... try_files /blank.html =404; }   # unchanged below
#
# Apply in /etc/nginx/sites-available/sailingsa BEFORE `location / {`.
#
# Do NOT enable a second symlink to the same file under sites-enabled (e.g. a
# “.bak” link) — nginx will load duplicate server{} blocks and ignore one.
#
# Do NOT `return 301` for `location = /index.html` — internal try_files for
# /class/… and other SPA routes rewrites to /index.html; a 301 would break them.
# Direct browser visits to /index.html are redirected to / by the inline script
# at the top of index.html.
#
# After edit: nginx -t && systemctl reload nginx

    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        try_files /blank.html =404;
    }

    location = /blank.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        try_files /blank.html =404;
    }
