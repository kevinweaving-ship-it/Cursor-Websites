# Live: /etc/nginx/sites-available/sailingsa (apex HTTPS server).
# nginx -t && systemctl reload nginx
#
# Goals:
# - GET /index.html → 301 → https://sailingsa.co.za/ (with slash before query)
# - GET /home → 301 → https://sailingsa.co.za/
# - SPA /class/* fallback must NOT use try_files … /index.html (internal URI hits = /index.html → 301 loop)
#
# Critical:
# 1) Use `https://sailingsa.co.za/$is_args$args` (note slash before $is_args), not
#    `https://sailingsa.co.za$is_args$args` or Location becomes host-only and can loop.
# 2) Server `index index.html` + `location = /index.html { return 301 … }` breaks `/`:
#    nginx internally maps `/` → `/index.html`. Add `location = /` that serves the shell
#    without re-entering `= /index.html` (rewrite … break works; try_files to /index.html does not).

#    location = / {
#        root /var/www/sailingsa;
#        rewrite ^ /index.html break;
#    }
#
#    location = /index.html {
#        return 301 https://sailingsa.co.za/$is_args$args;
#    }
#
#    location = /home {
#        return 301 https://sailingsa.co.za/$is_args$args;
#    }
#
#    location = /home/ {
#        return 301 https://sailingsa.co.za/$is_args$args;
#    }
#
#    location @class_spa {
#        root /var/www/sailingsa;
#        try_files /index.html =404;
#    }
#
