# STEP A + B: Remove legacy alias AND hard-fail old paths
#
# 1. Edit your sailingsa nginx config (e.g. /etc/nginx/sites-available/sailingsa or sailingsa.co.za)
# 2. DELETE any of these if present:
#    - location /sailingsa/frontend/ { ... }
#    - location /frontend/ { ... }
#    - alias /var/www/sailingsa/frontend;
#    - alias /var/www/sailingsa/sailingsa/frontend;
#    - rewrite ^/sailingsa/frontend/(.*)$ /$1 last;
#
# 3. ADD these blocks BEFORE "location /" (they force 404 on ghost paths):
#
# --- PASTE BELOW ---

    location ^~ /sailingsa/ {
        return 404;
    }

    location ^~ /frontend/ {
        return 404;
    }

# --- PASTE ABOVE ---
#
# 4. Run: nginx -t && systemctl reload nginx
#
# 5. Verify:
#    curl -I https://sailingsa.co.za/login.html              → 200 OK
#    curl -I https://sailingsa.co.za/sailingsa/frontend/login.html → 404
#    curl -I https://sailingsa.co.za/frontend/login.html     → 404
