# Insert in /etc/nginx/sites-available/sailingsa AFTER the port-80 server block and
# BEFORE the main sailingsa.co.za HTTPS server block.
#
# Purpose: single 301 from https://www.sailingsa.co.za → https://sailingsa.co.za
# (cert must list www in SAN — sailingsa.co.za LE cert does).
#
# nginx -t && systemctl reload nginx

server {
    listen 443 ssl;
    server_name www.sailingsa.co.za;

    ssl_certificate /etc/letsencrypt/live/sailingsa.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sailingsa.co.za/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://sailingsa.co.za$request_uri;
}
