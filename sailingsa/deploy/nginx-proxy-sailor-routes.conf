# SailingSA: proxy /api/, /, /index.html, /sailor/, /sailing/ to FastAPI (127.0.0.1:8000)
# INSERT THESE BLOCKS INSIDE your sailingsa server {} block,
# ABOVE any "location /" or "location / { try_files ... }" block.
#
# Then: nginx -t && sudo systemctl reload nginx

location /api/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
location = / {
    proxy_pass http://127.0.0.1:8000;
}
location = /index.html {
    proxy_pass http://127.0.0.1:8000;
}
location ~ ^/sailor/ {
    proxy_pass http://127.0.0.1:8000;
}
location ~ ^/sailing/ {
    proxy_pass http://127.0.0.1:8000;
}
