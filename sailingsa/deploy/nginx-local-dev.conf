# Local dev — paste inside server { } for docroot = SailingSA web root (login.html + index.html here).
# Ensures /login.html is the real file (no stub path); SPA fallback for everything else.

    location = /login.html {
        try_files /login.html =404;
    }

    location = /signup.html {
        return 301 /login.html;
    }

    location = /regatta_viewer.html {
        try_files /regatta_viewer.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
